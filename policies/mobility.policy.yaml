    note: >
      Includes AthensMoves opex with social contributions and OT, SaaS platform fees,
      routing API fees, programme management, and impound facility lease.
      AthensMoves annual low reflects €120k OASA revenue credit applied; high reflects
      €0 credit (Year 1 assumption held conservatively through programme life).
  eu_grants:
    label: Potential EU co-financing (ERDF + EUI — retrospective reimbursement only)
    low: 0
    high: 3500000
    note: >
      Modelled as retrospective reimbursement, not upfront financing. Given Greece's
      ~20% effective absorption rate and 2–4 year reimbursement lag, the programme must
      be fully funded from municipal budget. Any grant received reduces net capital outlay.


timeline:
  - month: 2
    milestone: Enforcement cooperation protocol agreed with Traffic Police; MoU negotiations opened; routing API provider selection begins
  - month: 3
    milestone: Municipal legal position on towing authority formalised; MoU with Hellenic Traffic Police signed
  - month: 4
    milestone: Tow trucks operational; enforcement teams deployed across all 7 districts; five fine pipeline interventions implemented (gov.gr notification, electronic seizure, certification unit, AADE transmission, Traffic Police handover protocol)
  - month: 6
    milestone: AthensMoves Ltd. formally incorporated; EU grant applications submitted; routing API contract signed
  - month: 8
    milestone: Tranche 1 traffic studies completed for central Kypseli sites; resident consultation begins; car-speed filter development complete and tested
  - month: 9
    milestone: OASA programmatic agreement signed (including car-speed filter methodology clause and 50% threshold); Tranche 1 space conversions begin (150 spaces, central Kypseli)
  - month: 12
    milestone: Tranche 1 conversions complete; AthensMoves launches city-wide with 8-vehicle fleet and car-speed filter active
  - month: 15
    milestone: Fleet utilisation and filter satisfaction rate reviewed; high-demand corridors identified; Tranche 2 traffic studies begin (western Patissia + Pangrati/Kaisariani)
  - month: 18
    milestone: >
      Scale-up decision point — if 3+ passengers/vehicle/hour threshold met, fleet
      expands to 15 vehicles; Tranche 2 space conversions begin (200 spaces).
      If threshold not met, causes reviewed (demand, filter calibration, API accuracy)
      before any expansion approved.
  - month: 24
    milestone: Tranche 2 conversions complete; fleet utilisation reviewed; Tranche 3 traffic studies begin (150 spaces, citywide priority streets)
  - month: 27
    milestone: Tranche 3 conversions begin; API contract renewal decision
  - month: 30
    milestone: Tranche 3 complete; 500-space programme fully delivered; full programme evaluation including car-speed filter calibration review


kpis:
  reporting_cadence: Quarterly public report; annual independent review
  note: >
    KPIs are published publicly on a quarterly basis. Public reporting is the primary
    institutionalisation mechanism — it makes defunding politically costly by forcing
    an explanation for why the numbers stopped moving. Per-measure KPIs are defined
    within each measure above; the indicators below apply across the programme as a whole.
  programme_wide:
    - id: car_registrations_target_zones
      label: New car registrations in target neighbourhoods (Kypseli, Patissia, Pangrati)
      type: proxy
      unit: registrations/quarter
      baseline: From AADE vehicle registry at programme start
      target: "Flat or declining trend vs. Athens-wide trend by month 24"
      frequency: annual
      source: AADE (Independent Authority for Public Revenue) vehicle registry
      note: >
        Slow-moving but robust proxy for car dependency. A divergence between
        target neighbourhoods and the Athens average is a meaningful signal.
        Annual cadence is sufficient — this is a trend indicator, not an
        operational one.

    - id: programme_spend_vs_budget
      label: Programme spend vs. approved budget (cumulative)
      type: financial
      unit: EUR
      baseline: 0
      target: "Within 15% of approved budget at each quarterly review"
      frequency: quarterly
      source: Programme management office / municipal finance


