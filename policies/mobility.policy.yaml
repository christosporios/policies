    title: Greece RRF Implementation Progress
    author: European Data Journalism Network
    year: 2025
    detail: "Greece met 28% of RRF milestones as of Feb 2025; effective absorption ~20%; average reimbursement lag 2–4 years post-expenditure"

  - id: towing_legal_research
    title: Municipal Police Towing Authority — Legal Research Note
    author: Internal research, March 2026
    detail: >
      Law 5003/2022 Art. 3(1)(β)(βα) assigns municipal police enforcement of Art. 34(8)
      KOK (towing provision). Law 5209/2025 (new KOK) may explicitly reference municipal
      tow trucks. No municipality has ever exercised independent towing authority.
      No NSK opinion, court ruling, or ministry circular has directly adjudicated the
      question. Operational authority exists in statute but is entirely untested.

  - id: law_542_1977
    title: "Law 542/1977, Article 71 — Fiscal Certification Deadline"
    author: Hellenic Parliament
    year: 1977
    detail: >
      Parking fines must be fiscally certified (ταμειακή βεβαίωση) within 3 years of
      the end of the violation year or they are legally extinguished. This is the
      binding constraint on the entire fine collection pipeline.

  - id: deputy_mayor_2025
    title: Statement by Athens Deputy Mayor on Parking Fine Collection
    author: Athens Deputy Mayor (Koromantzos)
    year: 2025
    month: October
    detail: >
      Confirmed that Hellenic Traffic Police take approximately 1.5 years to hand
      violation records to the municipal Revenue Certification Department, consuming
      half the 3-year certification window before municipal processing begins.

  - id: moi_circular_2023
    title: "Ministry of Interior Circular 534/38880/2023 and Clarification Letter 17729/23.02.2024"
    author: Ministry of Interior
    year: 2023
    detail: >
      Confirmed that fiscal certifications issued after the 3-year statutory deadline
      (Art. 71, N.542/1977) are unlawful. Transitional provisions under N.5027/2023
      Art. 72 gave municipalities until March 2, 2025 to pursue pre-2019 debts. A
      significant portion of the €143.7M backlog is likely legally uncollectable as
      a result.

  - id: law_5142_2024
    title: "Law 5142/2024 — Electronic Notification via gov.gr"
    author: Hellenic Parliament
    year: 2024
    detail: >
      Amends Law 4727/2020 to make electronic notification via gov.gr operational for
      municipal fines from July 16, 2025. Service deemed legally complete 10 working
      days after document upload. Eliminates reliance on postal address verification —
      the primary cause of notification failure and prescription.

  - id: law_5143_2024
    title: "Law 5143/2024, Article 32 and JMD 77123/2024 — Electronic Bank Account Seizure"
    author: Hellenic Parliament / Ministry of Finance
    year: 2024
    detail: >
      Enables municipalities to submit bank account seizure orders digitally via the
      OTA Node from October 2024, without AADE intermediation. Removes the previous
      bottleneck in enforcement against certified but unpaid debts.

  - id: kya_45081_1997
    title: "KYA 45081/1997 — Minimum Threshold for AADE Transmission"
    author: Ministry of Finance
    year: 1997
    detail: >
      Sets the minimum certified debt at €293.47 for transmission to AADE for
      enforcement action (tax clearance denial, bank seizure). Debts below this
      threshold cannot be referred to AADE. As of September 2022, 68,412 ΑΦΜs
      were blocked for €60.1M — well below the €143.7M total certified, indicating
      large volumes are not being referred.