meta:
  title: Athens Mobility Reform
  subtitle: A Three-Measure Policy Proposal
  scope: Municipality of Athens
  status: Proposal — Internal Review
  background_image: /hero-bg.jpg
  tagline: >
    Athens has become a parking lot. With {{stat:cars_per_capita}} cars per capita —
    one of Europe's highest — the city's pavements, bus stops, and crossings are
    colonised by vehicles. This paper proposes three coordinated measures: reduce
    the supply of parking, provide credible alternatives, and make not driving
    more appealing than driving. Each measure is within the mayor's direct legal
    authority; together they are designed to be mutually reinforcing.
  costs:
    setup_low: 3250000
    setup_high: 4350000
    annual_low: 980000
    annual_high: 1290000
  footer: All costs in EUR · Numbers grounded in cited sources · March 2026

measures:

  - id: enforcement
    title: Aggressive Parking Enforcement
    subtitle: Tow trucks · Municipal police · Traffic Police protocol
    tagline: Reclaim pavement; credible deterrence across 7 districts
    icon: shield

    context:
      body: |
        Athens has {{stat:cars_per_capita}} passenger cars per capita in the Attiki
        region — among the highest densities in Europe — with a chronic illegal parking
        problem across pavements, bus stops, and crossings. The most recent academic
        estimate puts daily illegal parking incidents at a minimum of
        {{stat:illegal_parking_daily}}, though this figure dates from 2012; a municipal
        survey is needed to establish a current baseline.

        The core problem is not the absence of rules but the absence of credible
        deterrence. The municipality holds over {{stat:outstanding_fines}} in outstanding
        unpaid fines with a documented collection rate of approximately
        {{stat:collection_rate}}. Fine notices are commonly sent years after the
        violation, and physical towing is extremely rare. The enforcement cycle must be
        restructured before volume is increased.
      stats:
        - id: cars_per_capita
          label: Cars per capita (Attiki)
          value: "0.87"
          source: "{{ref:eurostat_2023}}"
        - id: illegal_parking_daily
          label: Daily illegal parking incidents (lower bound)
          value: 8,000 vehicles
          source: "{{ref:spiliopoulou_2012}}"
        - id: outstanding_fines
          label: Outstanding unpaid fines
          value: "€143.7 million"
          source: "{{ref:athens_voice_2022}}"
        - id: collection_rate
          label: Fine collection rate
          value: 8%
          source: "{{ref:athens_voice_2022}}"
      notes:
        - The illegal parking figure dates from 2012. A current municipal survey is needed to establish a baseline.

    action:
      body: |
        The municipal police acquires 10 tow trucks and deploys dedicated enforcement
        teams across all 7 districts, 7 days a week. Priority targets: pavement parking,
        bus stop obstruction, pedestrian crossings.

        **Legal position on towing — assertive but uncertain.** Under {{legal:law_5003}},
        Article 3(1)(β)(βα) assigns municipal police enforcement of Article 34(8) of the
        Highway Code — the towing provision — by designating them as "competent police
        organs" for this purpose. The new Highway Code ({{legal:law_5209}}) goes further:
        secondary sources indicate it explicitly references "the municipality's tow truck"
        alongside the Traffic Police's. The municipality should assert this authority
        directly and act on it. However, no Greek municipality has ever independently
        operated tow trucks for parking enforcement. There is no court ruling, no Legal
        Council of the State opinion, and no ministry circular that has directly tested
        or validated this power. Legal uncertainty exists and must be acknowledged.

        To manage this risk without surrendering operational momentum, the municipality
        simultaneously pursues two tracks: (1) it acquires tow trucks and begins
        operations on the basis that the statutory authority is clear; and (2) it
        negotiates a Memorandum of Understanding with the Hellenic Traffic Police
        establishing joint operations, agreed dispatch protocols, and shared impound
        facilities. The MoU serves a dual purpose: it provides operational cover while
        the legal question remains unsettled, and it creates a durable coordination
        framework that survives any subsequent legal challenge. If a court or ministry
        later confirms municipal towing authority, the MoU becomes a cooperation
        agreement rather than a dependency. If the authority is narrowed, the MoU
        ensures operations continue without interruption.

        A fast-track debt certification process cuts the fine-to-collection lag from
        years to weeks. Towing revenue and improved fine collection are treated as
        operational upside, not budget assumptions.
      legal:
        - id: law_5003
          citation: "Law 5003/2022, Article 3(1)(β)(βα)"
          relevance: >
            Assigns municipal police enforcement of Article 34(8) KOK — the towing
            provision — by designating them "competent police organs" for parking
            enforcement. No municipality has yet acted on this authority.
        - id: law_5209
          citation: "Law 5209/2025 (new KOK), Article 50 / Article 106"
          relevance: >
            Restructured parking enforcement provisions; secondary sources indicate
            explicit reference to "tow trucks of the municipality or the Traffic Police."
            Operative text should be verified against the official ΦΕΚ before filing
            any legal position.
      notes:
        - No municipality has ever independently towed vehicles for parking enforcement in Greece. The authority exists in statute but is operationally untested.
        - Towing revenue and improved fine collection are treated as operational upside, not budget assumptions.
        - The MoU with Traffic Police is both a risk-mitigation tool and a permanent operational asset.

    case_studies:
      - name: Oslo Parking Removal Programme
        location: Oslo, Norway
        period: "2016–2019"
        type: positive
        body: |
          Oslo removed approximately 760 on-street spaces from the city centre over three
          years, replacing them with cycle lanes, parklets, and pedestrian infrastructure.
          Measured outcome: a 28% drop in city-centre car traffic {{ref:oslo_fastcompany}}.
          The programme ran alongside congestion pricing and significant transit investment
          — the traffic reduction was multi-causal and cannot be attributed to parking
          removal alone.
        lesson: |
          The parking removal component is directly replicable. Congestion pricing requires
          national-level coordination beyond the mayor's current mandate and is not
          proposed here.

    budget:
      items:
        - id: tow_trucks
          label: 10 tow trucks
          type: one_time
          low: 800000
          high: 1200000
        - id: officers
          label: 20 additional officers
          type: annual
          low: 400000
          high: 500000
        - id: impound
          label: "Impound facility — lease (€0 if MoU secures Traffic Police facility; up to €400k/year if standalone)"
          type: annual
          low: 0
          high: 400000
      notes:
        - No revenue credit taken for fines or towing fees. Programme is sized to be defensible on cost alone.
        - Impound at €0 assumes MoU secures shared Traffic Police facility. This must be treated as a minimum MoU requirement, not an assumption. If it fails, €150–400k/year standalone lease applies.


  - id: space_conversion
    title: Convert 500 Legal Parking Spaces
    subtitle: Parklets · E-bike hubs · AthensMoves stops · Three tranches over 30 months
    tagline: "Permanently reduce parking supply — 2,000 m² green space · 1,200 e-bike docks · 100 stops. Fewer spaces means fewer car trips; conversion replaces parking with alternatives that make not driving the easier choice."
    icon: leaf

    context:
      body: |
        Converting legal on-street spaces is the supply-side complement to enforcement.
        Enforcement deters illegal parking; conversion permanently eliminates legal spaces,
        reducing the total parking supply available to private cars and forcing a modal
        shift over time. The effect is cumulative: each converted space is one fewer
        reason to drive.

        The PARKinATHENS system covers {{stat:parkinathens_total}} controlled on-street
        spaces ({{stat:parkinathens_breakdown}}). A comprehensive count of all legal
        on-street parking — controlled and uncontrolled — has not been publicly published;
        a municipal inventory should be conducted before the conversion list is finalised.
        Converting 500 spaces across 30 months — roughly 4.4% of the controlled inventory
        — is material without being administratively implausible, and is well within
        Municipal Council authority under {{legal:law_5209_conv}}.
      stats:
        - id: parkinathens_total
          label: Controlled on-street spaces (PARKinATHENS)
          value: "11,244"
          source: "{{ref:parkinathens}}"
        - id: parkinathens_breakdown
          label: Breakdown by category
          value: "5,177 residents' + 3,463 visitors' + 1,604 motorcycle + 1,000 disability"
          source: "{{ref:parkinathens}}"
      notes:
        - A comprehensive count of uncontrolled on-street spaces has not been publicly published. A municipal inventory is needed before the conversion list is finalised.
        - The conversion programme is explicitly designed to reduce the city's total parking supply, not merely to reallocate space. Each conversion is permanent.

    action:
      body: |
        500 on-street spaces are converted across three tranches over 30 months,
        coordinated geographically with AthensMoves zone launches so that parking
        removal and transit alternatives arrive in the same area at the same time.
        This sequencing is deliberate: enforcement without alternatives generates
        political backlash; alternatives without enforcement generate no behaviour change.

        Tranche 1 (150 spaces, months 9–12) is concentrated in central Kypseli — the
        interior streets between Victoria and Pedion Areos metro stations, where walking
        distance to rail exceeds 15 minutes and bus coverage is limited to the Patission
        axial corridor. Tranche 2 (200 spaces, months 18–24) expands into western Patissia
        and Pangrati/Kaisariani, conditional on Zone 1 ridership data from AthensMoves.
        Tranche 3 (150 spaces, months 24–30) covers remaining priority streets citywide,
        weighted toward AthensMoves stop infrastructure.

        Each conversion requires a Municipal Council decision and a traffic study under
        {{legal:law_5209_conv}} — this is not a unilateral executive action. Site
        selection criteria: spaces currently obstructing pavements, locations adjacent to
        AthensMoves service zones, streets with documented pedestrian conflict, and areas
        with no adjacent private parking supply. Resident and business consultation is
        built into each traffic study to manage political friction ahead of Council votes.
      legal:
        - id: law_5209_conv
          citation: "Law 5209/2025 (KOK), Article 55"
          relevance: >
            Municipal Council authority to alter road cross-sections and parking
            designations, subject to traffic study and review by Coordinator of
            Decentralized Administration.
      tranches:
        - tranche: 1
          spaces: 150
          months: "9–12"
          area: Central Kypseli (interior streets, Victoria–Pedion Areos corridor)
          mix: "60 parklets · 60 e-bike docks · 30 AthensMoves stops"
        - tranche: 2
          spaces: 200
          months: "18–24"
          area: Western Patissia + Pangrati/Kaisariani (conditional on Zone 1 data)
          mix: "80 parklets · 80 e-bike docks · 40 AthensMoves stops"
        - tranche: 3
          spaces: 150
          months: "24–30"
          area: Remaining priority streets across all 7 districts
          mix: "60 parklets · 60 e-bike docks · 30 AthensMoves stops"
      allocations:
        - quantity: 200
          label: Pocket parks & parklets
          output: "~2,000 m² green space"
          icon: leaf
        - quantity: 200
          label: E-bike parking & charging hubs
          output: "~1,200 docking points"
          icon: bicycle
        - quantity: 100
          label: AthensMoves stops
          output: Dedicated pick-up / drop-off
          icon: bus

    case_studies:
      - name: Barcelona Superblock Sant Antoni
        location: Barcelona, Spain
        period: "2017–ongoing"
        type: positive
        body: |
          Barcelona's superblock programme redirects through-traffic to perimeter roads,
          converting interior streets into pedestrian and cycling space. Results in Sant
          Antoni: car traffic fell by 82%, NO₂ dropped 33%. Critically, each conversion
          was preceded by public consultation and a traffic study — precisely the approach
          proposed here. Incremental conversion with genuine consultation is what
          distinguished Barcelona's success from Athens's failed "Great Walk"
          pedestrianisation (2020), which lacked both.
        lesson: |
          Scale matters less than process. Incremental conversion with genuine public
          consultation is the deciding variable.

    budget:
      items:
        - id: parklets
          label: "Parklets (200 spaces, 3 tranches — basic construction: planters, seating, paving)"
          type: one_time
          low: 600000
          high: 1000000
        - id: ebike_docking
          label: E-bike docking & charging infrastructure (200 spaces — infrastructure only, not bikes)
          type: one_time
          low: 800000
          high: 1200000
        - id: signage
          label: Signage, remarking, AthensMoves stops (100 stops)
          type: one_time
          low: 200000
          high: 300000
        - id: traffic_studies
          label: Traffic studies + resident consultation (3 tranches × ~€20–25k each)
          type: one_time
          low: 60000
          high: 75000
      notes:
        - >
          E-bike infrastructure covers docking and charging hardware only. If the municipality
          operates the bikes directly rather than licensing to a private operator, e-bike
          procurement (est. €1,500–3,000 per bike) is an additional capital item requiring
          a separate business case. Private operator licensing is strongly preferred and
          avoids this cost entirely.
        - >
          The municipality applies in parallel for ERDF/Cohesion Fund co-financing
          (up to 85%) {{ref:erdf}} and EUI Innovative Actions (up to 80%, max €5M).
          Greece's absorption record is slow — realistic reimbursement is 2027–2029
          at earliest. The full cost is budgeted municipally; any grant received reduces
          net capital outlay retrospectively.


  - id: athensmoves
    title: AthensMoves — On-Demand Minibus
    subtitle: Municipal Development Company · OASA programmatic agreement · Unified ticket
    tagline: First/last-mile in central Kypseli, OASA-integrated, 8 EVs — the positive alternative that makes not owning a car a viable choice
    icon: bus

    context:
      body: |
        Enforcement and space conversion reduce the supply of parking. For this to result
        in fewer car trips — rather than simply more frustrated drivers — residents need a
        credible alternative for the journeys currently made by car. Athens's fixed-route
        network (metro, tram, bus) covers main arteries well but leaves interior
        neighbourhoods underserved in two distinct ways: walking distance to rail, and
        frequency on secondary bus routes. AthensMoves targets both gaps.

        Zone 1 (central Kypseli) has a rail access gap: the interior streets between
        Victoria and Pedion Areos stations sit 1,350–1,770m from the nearest Line 1
        entry point — 17–22 minutes on foot — well above the 10-minute threshold at which
        walking to transit becomes a barrier to car-free living. Bus lines 035 and 060
        serve the Patission axial corridor but do not penetrate the interior grid; residents
        on streets like Fokionos Negri have no direct bus to a metro station.

        Zone 2 (western Patissia) has a frequency gap: Line 1 stations are within
        acceptable walking distance, but secondary bus routes serving cross-neighbourhood
        trips run at 35–45 minute headways at night — intervals that make the bus
        practically unusable for time-sensitive journeys and force car dependency even
        where infrastructure exists.

        The municipality establishes a wholly-owned Municipal Development Company under
        {{legal:law_4555}} {{ref:kleisthenis}}. Athens already operates DAEM S.A. under
        the same legal framework {{ref:daem}} — this is a well-precedented path with no
        novel legal obstacles.
      notes:
        - >
          Academic research consistently shows on-demand transit performs worst in dense
          urban areas already served by fixed-route networks {{ref:liezenga_2024}}.
          The failure rate is high: 50% of demand-responsive services last fewer than
          7 years, 40% fewer than 3 years {{ref:mulley_2020}}. This proposal addresses
          the risk by targeting only genuinely underserved neighbourhoods, launching in a
          single defined zone, and making scale-up conditional on hard ridership data.

    action:
      body: |
        {{legal:law_3920}} gives OASA sweeping coordinating authority over all public
        transport in Attica {{ref:law_3920}}. A municipality operating its own
        fare-setting transport service in the metro-served core would almost certainly
        trigger a jurisdictional dispute. AthensMoves sidesteps this entirely by
        operating under a formal programmatic agreement with OASA — a well-established
        legal instrument under Greek administrative law — in which OASA endorses the
        service as a gap-filling complement to its own network. AthensMoves is positioned
        exclusively as first/last-mile connectivity to metro stations in neighbourhoods
        with poor fixed-route coverage, and does not operate in the metro-served core.
        Fare integration uses the unified OASA contactless ticket (bank card or OASA
        card) at the standard OASA fare — removing any risk of undercutting OASA's fare
        base and making AthensMoves a political asset for OASA rather than a rival.

        **Zone 1 pilot (central Kypseli) launches at month 12**, co-incident with Tranche 1
        space conversions in the same streets. Service area: the interior grid bounded by
        Patission (west), Alexandras (south), Kifissias (east), and Kypselis (north) —
        the area where walking distance to Line 1 exceeds 15 minutes. Zone 2 (western
        Patissia) launches at month 18 only if Zone 1 meets the ridership threshold,
        addressing frequency rather than distance as its primary gap. Zone 3
        (Pangrati/Kaisariani) is contingent on Zone 2 data.
      legal:
        - id: law_4555
          citation: "Law 4555/2018, Articles 182–183"
          relevance: >
            Explicit municipal authority to form a Municipal Development Company
            for transport services ("Kleisthenis Reform").
        - id: law_3920
          citation: "Law 3920/2011"
          relevance: >
            OASA's coordinating authority over all public transport in Attica.
            Municipal service requires a programmatic agreement with OASA to
            operate legally without jurisdictional conflict.
      params:
        - key: Fleet (Year 1)
          value: 8 electric minibuses
        - key: Vehicle type
          value: Karsan e-JEST or equiv.
        - key: Zone 1 (launch)
          value: "Central Kypseli interior grid — Month 12 (rail distance gap: 15–22 min walk to Line 1)"
        - key: Zone 2 (conditional)
          value: "Western Patissia — Month 18 if threshold met (frequency gap: 35–45 min night bus headways)"
        - key: Zone 3 (conditional)
          value: Pangrati/Kaisariani — contingent on Zone 2 data
        - key: Hours
          value: "07:00 – 23:00 daily"
        - key: Fare
          value: OASA unified ticket
        - key: Routing
          value: Dynamic, app + phone booking
        - key: Scale-up threshold
          value: 3+ passengers / vehicle / hour
        - key: "Year 2 (conditional)"
          value: 15 vehicles, Zone 2 + possible Zone 3

    case_studies:
      - name: Jersey City Via Partnership
        location: Jersey City, NJ, USA
        period: "2018–ongoing"
        type: positive
        body: |
          Jersey City launched an on-demand shared minibus service with Via, starting
          with 17 vehicles and expanding to 26. By 2022 the service had carried 2 million
          rides, with 90% of rides shared and an average of 4.2 trips per vehicle per
          hour — above the viability threshold. Annual contract cost: $7.5 million
          {{ref:jersey_city_via}}. The service targets underserved neighbourhoods with
          limited fixed-route access — low-density zones with genuine transit gaps and
          clear first/last-mile framing. AthensMoves replicates these conditions by
          restricting service to non-metro-served neighbourhoods.
        lesson: |
          Viability follows from targeting genuine gaps, not from deploying broadly.
          The 4.2 trips/vehicle/hour outcome validates the 3+ threshold used here.

      - name: Helsinki Kutsuplus
        location: Helsinki, Finland
        period: "2012–2015"
        type: cautionary
        body: |
          Helsinki launched Kutsuplus with 15 minibuses across a city already served by
          excellent metro, tram, and bus networks. The service was cancelled after three
          years because cost-per-trip was "unacceptable compared to passenger numbers"
          {{ref:kutsuplus}}. Microtransit fails when deployed as a general urban service
          competing with fixed routes.
        lesson: |
          AthensMoves avoids this failure mode by operating only where OASA does not,
          launching in a single zone, and setting an explicit ridership threshold before
          any scale-up is approved.

    budget:
      items:
        - id: ev_minibuses
          label: "8 EV minibuses (~€250–300k each)"
          type: one_time
          low: 2000000
          high: 2400000
          source: "{{ref:karsan_pricing}}"
        - id: charging
          label: Depot + 8 fast chargers + electrical works
          type: one_time
          low: 350000
          high: 600000
        - id: tech_platform
          label: Tech platform licence + setup (white-label on-demand routing)
          type: one_time
          low: 150000
          high: 250000
        - id: company_formation
          label: Company formation + legal + procurement costs
          type: one_time
          low: 100000
          high: 150000
        - id: operations
          label: "Annual operations — 16 drivers, 4 admin/IT, maintenance (incl. employer social contributions ~25%, OT provision)"
          type: annual
          low: 850000
          high: 1100000
        - id: tech_saas
          label: Annual platform SaaS licence + support
          type: annual
          low: 80000
          high: 150000
        - id: oasa_revenue
          label: "Less — OASA fare revenue share (est.; treat as €0 in Year 1 pending agreement terms)"
          type: annual_credit
          low: -120000
          high: 0
      notes:
        - >
          Operations cost corrected from earlier draft to include employer social
          contributions (~25% on top of gross salary) and an overtime provision.
          Transit drivers commonly earn 20–30% above base in overtime; excluding this
          produces a structurally underfunded opex line.
        - >
          Platform SaaS fees (previously omitted) are a fixed annual cost regardless
          of ridership. They must be budgeted from Year 1, not deferred to scale-up.
        - >
          OASA revenue share is modelled as €0 in Year 1 — the revenue-sharing terms
          will not be finalised before service launch and should not be relied upon for
          budget closure. Upside only from Year 2 if terms are agreed.
        - >
          Applications submitted in parallel for ERDF EV fleet co-financing (up to 85%)
          and EUI Innovative Actions (up to 80%). Given Greece's documented absorption
          delays {{ref:greece_absorption}} — effective absorption ~20%, average
          reimbursement lag 2–4 years — EU grants are modelled as retrospective
          reimbursement only. The service operates on municipal budget from day one.


cross_cutting_costs:
  note: >
    These costs apply to the programme as a whole and were absent from the original
    per-measure budgets. They are not optional — omitting them is how municipal
    programmes quietly fail.
  items:
    - id: programme_management
      label: "Programme director + project officer (dedicated, full-time, 30-month programme)"
      type: annual
      low: 120000
      high: 180000
      note: >
        Someone must coordinate three measures across municipal police, Municipal Council,
        and AthensMoves Ltd., manage the MoU negotiation, oversee the OASA agreement, and
        run procurement. Without dedicated capacity this role defaults to an existing
        official doing it part-time, which is how timelines slip by years.
    - id: legal
      label: External legal counsel (towing authority position + MoU + company formation + contingency litigation)
      type: one_time
      low: 80000
      high: 200000
      note: >
        The towing authority question requires a formal legal opinion before operations
        begin. MoU drafting and the OASA programmatic agreement both require specialist
        administrative law counsel. If challenged in court, litigation costs are additional
        and unbounded — €80–200k covers the pre-litigation legal work only.
    - id: communications
      label: Public consultation + communications (3 tranches × 7 districts, 30 months)
      type: one_time
      low: 80000
      high: 150000
      note: >
        Consultation is identified in the Barcelona case study as the deciding variable
        between success and failure. Neighbourhood meetings, printed materials, a
        programme website, and a media strategy across 3 tranches and 7 districts cannot
        be done on zero budget. This is the most likely item to be cut and the most
        likely cause of political failure if it is.

summary:
  setup:
    label: Total one-time capital (enforcement + conversion + AthensMoves + cross-cutting)
    low: 5300000
    high: 7300000
    note: >
      Previous estimate was €3.25–4.35M. The increase reflects: corrected AthensMoves
      depot/charging (€350–600k vs €200–300k), traffic studies (€60–75k, previously
      omitted), legal costs (€80–200k, previously omitted), and communications
      (€80–150k, previously omitted).
  annual:
    label: Total annual operating cost
    low: 1530000
    high: 2330000
    note: >
      Previous estimate was €980k–1.29M/year. The increase reflects: corrected AthensMoves
      opex with social contributions and OT (€850k–1.1M vs €700–850k), SaaS platform fees
      (€80–150k, previously omitted), programme management (€120–180k, previously omitted),
      and impound facility contingency (€0–400k depending on MoU outcome).
  eu_grants:
    label: Potential EU co-financing (ERDF + EUI — retrospective reimbursement only)
    low: 0
    high: 3500000
    note: >
      Modelled as retrospective reimbursement, not upfront financing. Given Greece's
      ~20% effective absorption rate and 2–4 year reimbursement lag, the programme must
      be fully funded from municipal budget. Any grant received reduces net capital outlay.

timeline:
  - month: 2
    milestone: Enforcement cooperation protocol agreed with the Traffic Police; MoU negotiations opened
  - month: 3
    milestone: Municipal legal position on towing authority formalised; MoU with Hellenic Traffic Police signed
  - month: 4
    milestone: Tow trucks operational; enforcement teams deployed across all 7 districts
  - month: 6
    milestone: AthensMoves Ltd. formally incorporated; EU grant applications submitted
  - month: 8
    milestone: Tranche 1 traffic studies completed for central Kypseli sites; resident consultation begins
  - month: 9
    milestone: OASA programmatic agreement signed; Tranche 1 space conversions begin (150 spaces, central Kypseli interior grid)
  - month: 12
    milestone: Tranche 1 conversions complete; AthensMoves Zone 1 pilot launches in central Kypseli; 8-vehicle fleet operational
  - month: 15
    milestone: Zone 1 ridership data reviewed against 3+ passengers/vehicle/hour threshold; Tranche 2 traffic studies begin (western Patissia + Pangrati/Kaisariani)
  - month: 18
    milestone: >
      Scale-up decision point — if threshold met, Zone 2 (western Patissia, frequency gap)
      launches; Tranche 2 space conversions begin (200 spaces).
      If threshold not met, Zone 1 continues; causes reviewed before expansion.
  - month: 24
    milestone: Tranche 2 conversions complete; Zone 2 ridership reviewed; Tranche 3 traffic studies begin (150 spaces, citywide priority streets)
  - month: 27
    milestone: Zone 3 (Pangrati/Kaisariani) launches if Zone 2 data warrants; Tranche 3 conversions begin
  - month: 30
    milestone: Tranche 3 complete; 500-space programme fully delivered; full programme evaluation


kpis:
  reporting_cadence: Quarterly public report; annual independent review
  note: >
    KPIs are published publicly on a quarterly basis. Public reporting is the primary
    institutionalisation mechanism — it makes defunding politically costly by forcing
    an explanation for why the numbers stopped moving.

  measures:

    - measure_id: enforcement
      title: Parking Enforcement
      indicators:
        - id: tows_per_week
          label: Tows per week
          type: operational
          unit: vehicles/week
          baseline: "~0 (no independent municipal towing currently)"
          target: "≥70/week by month 6; ≥175/week by month 12"
          frequency: monthly
          source: Municipal police operations log

        - id: fine_notices_issued
          label: Fine notices issued
          type: operational
          unit: notices/month
          baseline: To be established via municipal survey (month 1)
          target: "≥5,000/month by month 6 across 7 districts"
          frequency: monthly
          source: Municipal police operations log

        - id: fine_collection_rate
          label: Fine collection rate
          type: outcome
          unit: percentage
          baseline: "8% ({{ref:athens_voice_2022}})"
          target: "≥25% by month 12; ≥40% by month 24"
          frequency: quarterly
          source: Municipal finance department
          note: >
            This is the single most important enforcement KPI. The 8% baseline is a
            political equilibrium, not a technical limit. Movement on this number is
            the clearest signal that deterrence is working.

        - id: pavement_obstruction_complaints
          label: Pavement obstruction complaints (311 / municipal complaints system)
          type: proxy
          unit: complaints/month
          baseline: To be established from existing complaints data
          target: "≥30% reduction from baseline by month 18"
          frequency: quarterly
          source: Municipal complaints system
          note: >
            Proxy for illegal parking volume. Cheaper than a full street survey and
            politically legible — complaint reduction is a story the mayor can tell.

    - measure_id: space_conversion
      label: Space Conversion
      indicators:
        - id: spaces_converted
          label: Spaces converted (cumulative)
          type: operational
          unit: spaces
          baseline: 0
          target: "150 by month 12 · 350 by month 24 · 500 by month 30"
          frequency: monthly
          source: Programme management office

        - id: green_area_delivered
          label: Green/pedestrian area delivered (cumulative)
          type: outcome
          unit: m²
          baseline: 0
          target: "~750 m² by month 12 · ~2,000 m² by month 30"
          frequency: quarterly
          source: Programme management office

        - id: ebike_docks_operational
          label: E-bike docking points operational (cumulative)
          type: operational
          unit: docking points
          baseline: 0
          target: "~360 by month 12 · ~1,200 by month 30"
          frequency: quarterly
          source: Operator data (if licensed) or municipal infrastructure log

        - id: bikes_stored
          label: Bikes stored / docked at peak hour
          type: outcome
          unit: bikes
          baseline: 0
          target: ">60% dock occupancy at peak by month 18"
          frequency: monthly
          source: Operator data
          note: >
            Dock occupancy is a better signal than dock count — empty docks mean the
            infrastructure exists but isn't being used. Peak-hour occupancy above 60%
            indicates genuine demand.

        - id: parkinathens_utilisation
          label: PARKinATHENS controlled space utilisation rate in converted zones
          type: proxy
          unit: percentage occupancy
          baseline: To be established from PARKinATHENS sensor data
          target: "No increase in utilisation in adjacent streets (displacement check)"
          frequency: quarterly
          source: PARKinATHENS operator data
          note: >
            Proxy for modal shift and displacement effect. If removed spaces cause
            adjacent controlled spaces to fill up, drivers are circling rather than
            switching modes — the conversion is displacing parking, not reducing it.
            Flat or falling utilisation in adjacent streets is the signal that
            behaviour is actually changing.

    - measure_id: athensmoves
      label: AthensMoves
      indicators:
        - id: rides_per_vehicle_hour
          label: Rides per vehicle per hour
          type: outcome
          unit: rides/vehicle/hour
          baseline: 0 (pre-launch)
          target: "≥3.0 by month 15 (scale-up threshold) · ≥4.0 by month 24"
          frequency: monthly
          source: AthensMoves platform data
          note: >
            This is the primary scale-up gate. Below 3.0 at month 15, Zone 2 does
            not launch. The Jersey City Via benchmark of 4.2 is the long-run target.

        - id: cost_per_ride
          label: Cost per ride (gross, pre-revenue)
          type: financial
          unit: EUR/ride
          baseline: 0 (pre-launch)
          target: "<€4.00 by month 18; <€3.00 by month 24 as fleet utilisation improves"
          frequency: monthly
          source: AthensMoves finance / platform data

        - id: active_users
          label: Registered active users (≥1 ride in past 30 days)
          type: operational
          unit: users
          baseline: 0
          target: "≥500 by month 15 · ≥1,500 by month 24"
          frequency: monthly
          source: AthensMoves platform data

        - id: zone_coverage
          label: Zones operational
          type: operational
          unit: zones
          baseline: 0
          target: "1 by month 12 · 2 by month 18 (conditional) · 3 by month 27 (conditional)"
          frequency: quarterly
          source: Programme management office

        - id: car_trip_substitution
          label: "Self-reported car trip substitution rate (quarterly user survey)"
          type: proxy
          unit: percentage of rides
          baseline: n/a
          target: "≥40% of rides replacing a car trip by month 18"
          frequency: quarterly
          source: AthensMoves in-app survey (short, post-ride)
          note: >
            Cheap proxy for modal shift. Not academically rigorous but politically
            legible and operationally actionable. If substitution rate is low, the
            service is attracting walkers and existing transit users, not car drivers —
            the programme's core goal is not being met.

  programme_wide:
    indicators:
      - id: car_registrations_target_zones
        label: New car registrations in target neighbourhoods (Kypseli, Patissia, Pangrati)
        type: proxy
        unit: registrations/quarter
        baseline: From AADE vehicle registry at programme start
        target: "Flat or declining trend vs. Athens-wide trend by month 24"
        frequency: annual
        source: AADE (Independent Authority for Public Revenue) vehicle registry
        note: >
          Slow-moving but robust proxy for car dependency. A divergence between
          target neighbourhoods and the Athens average is a meaningful signal.
          Annual cadence is sufficient — this is a trend indicator, not an
          operational one.

      - id: programme_spend_vs_budget
        label: Programme spend vs. approved budget (cumulative)
        type: financial
        unit: EUR
        baseline: 0
        target: "Within 15% of approved budget at each quarterly review"
        frequency: quarterly
        source: Programme management office / municipal finance


