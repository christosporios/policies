timeline:
  - month: 1
    milestone: Municipal Council approves EATA articles-of-association amendment adding housing mandate; programme director appointed
  - month: 3
    milestone: Housing Observatory data unit operational; portal scraping and TAP data integration begins; One-Stop Office location secured
  - month: 4
    milestone: External legal opinion on dangerous building enforcement scope obtained; guarantee fund structure finalised by counsel
  - month: 6
    milestone: One-Stop Housing Office opens; vacancy register database development complete; first landlord outreach campaign launches; first Athens Housing Monitor report published
  - month: 8
    milestone: SRA Tranche 1 leasing begins — 100 units from public-property owners and municipal buildings; guarantee fund capitalised and operational
  - month: 9
    milestone: Vacancy register identifies first 5,000 properties; targeted SRA invitations sent to owners of verified vacant properties
  - month: 12
    milestone: >
      SRA reaches 100 units under management; building enforcement unit begins
      systematic surveys of flagged derelict buildings; EU grant applications
      submitted (ESF+ for SRA operations, EUI for Observatory/Office)
  - month: 15
    milestone: >
      SRA Tranche 2 begins — extension to private landlords via guarantee fund;
      first enforcement notices issued for genuinely dangerous buildings; guarantee
      call rate reviewed and tenant selection criteria adjusted if above 7%
  - month: 18
    milestone: >
      Programme review point: SRA at 200+ units; guarantee fund performance
      assessed; vacancy register at 10,000+ identified properties; enforcement
      compliance rate reviewed. If SRA landlord recruitment below target, guarantee
      terms and lease-in rates are revised.
  - month: 24
    milestone: >
      SRA reaches 300 units; Tranche 3 begins — targeting neighbourhoods with
      concentrated vacancy identified by register; building enforcement expanded
      to severely degraded buildings (if legal opinion supports); Housing Monitor
      has published 6 quarterly reports
  - month: 27
    milestone: EIB/CEB loan application prepared for programme scale-up beyond 500 units (conditional on SRA performance and institutional capacity)
  - month: 30
    milestone: >
      500-unit target assessed; full programme evaluation published; Municipal
      Council decision on continuation and scale-up; if targets met, EATA
      housing mandate made permanent and EIB/CEB financing pursued for 1,000+
      unit scale


kpis:
  reporting_cadence: Quarterly public report (via Athens Housing Monitor); annual independent review
  note: >
    KPIs are published publicly on a quarterly basis as part of the Athens Housing
    Monitor. Public reporting is the primary institutionalisation mechanism — it makes
    defunding politically costly by forcing an explanation for why the numbers stopped
    moving. Per-measure KPIs are defined within each measure above; the indicators
    below apply across the programme as a whole.
  programme_wide:
    - id: housing_cost_burden_target
      label: Average housing cost burden of programme beneficiaries (all measures)
      type: outcome
      unit: percentage of disposable income
      baseline: ">40% (eligibility threshold)"
      target: "≤30% for SRA tenants; measurable reduction in citywide overburden rate by month 30"
      frequency: quarterly
      source: EATA Housing Division / Housing Observatory
      note: >
        The programme's fundamental purpose is to reduce housing cost burden.
        If beneficiary burden does not fall below 30%, the programme is mispriced.
        Citywide impact is a slower signal — the 500-unit programme is too small to
        move the 28.9% overburden rate materially, but trend direction matters.

    - id: vacant_units_activated
      label: Vacant units brought into active rental use (SRA + enforcement-induced)
      type: outcome
      unit: units
      baseline: 0
      target: "500 via SRA + ≥200 via enforcement compliance by month 30"
      frequency: quarterly
      source: EATA Housing Division / vacancy register

    - id: programme_spend_vs_budget
      label: Programme spend vs. approved budget (cumulative)
      type: financial
      unit: EUR
      baseline: 0
      target: "Within 15% of approved budget at each quarterly review"
      frequency: quarterly
      source: Programme management office / EATA finance


